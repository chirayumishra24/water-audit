<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trace Your Tap – Water Journey Simulator</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap"
    rel="stylesheet" />

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #0c4a6e 0%, #0ea5e9 30%, #7dd3fc 60%, #e0f2fe 100%);
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
    }

    /* Animated water waves */
    .wave {
      position: fixed; bottom: 0; left: 0; right: 0; height: 120px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ffffff" fill-opacity="0.25" d="M0,192L48,197.3C96,203,192,213,288,213.3C384,213,480,203,576,208C672,213,768,203,864,192C960,181,1056,171,1152,160C1248,149,1344,139,1392,133.3L1440,128L1440,320L0,320Z"></path></svg>') repeat-x bottom;
      animation: wave 18s linear infinite;
      pointer-events: none; z-index: 0;
    }
    .wave2 {
      position: fixed; bottom: 0; left: 0; right: 0; height: 100px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ffffff" fill-opacity="0.15" d="M0,256L60,245.3C120,235,240,213,360,208C480,203,600,213,720,229.3C840,245,960,267,1080,261.3C1200,256,1320,224,1380,208L1440,192L1440,320L0,320Z"></path></svg>') repeat-x bottom;
      animation: wave 12s linear infinite reverse;
      pointer-events: none; z-index: 0;
    }
    @keyframes wave { 0% { background-position-x: 0; } 100% { background-position-x: -1440px; } }

    /* Bubbles */
    .bubble {
      position: fixed; background: rgba(255,255,255,0.15); border-radius: 50%;
      pointer-events: none; animation: rise linear infinite; z-index: 0;
    }
    @keyframes rise {
      0% { transform: translateY(0) scale(1); opacity: 0.6; }
      100% { transform: translateY(-100vh) scale(0.3); opacity: 0; }
    }

    /* Progress pipeline */
    .pipeline-track {
      background: rgba(255,255,255,0.15); height: 8px; border-radius: 4px;
      position: relative; overflow: hidden;
    }
    .pipeline-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, #06b6d4, #3b82f6, #8b5cf6);
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .pipeline-fill::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

    /* Score gauges */
    .gauge-ring {
      width: 72px; height: 72px; border-radius: 50%;
      background: conic-gradient(var(--color) var(--pct), rgba(255,255,255,0.15) var(--pct));
      display: flex; align-items: center; justify-content: center;
      transition: background 0.8s ease;
    }
    .gauge-inner {
      width: 54px; height: 54px; border-radius: 50%;
      background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; color: white;
    }

    /* Journey nodes */
    .node-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 30px; font-size: 13px; font-weight: 600;
      background: rgba(255,255,255,0.2); backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.3); color: white;
      animation: nodeIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      opacity: 0; transform: scale(0.5);
    }
    .node-pill.active { background: rgba(59,130,246,0.5); border-color: #60a5fa; }
    .node-pill.done { background: rgba(16,185,129,0.4); border-color: #34d399; }
    @keyframes nodeIn { to { opacity: 1; transform: scale(1); } }

    .node-arrow { color: rgba(255,255,255,0.3); font-size: 18px; }

    /* Choice cards */
    .choice-card {
      background: rgba(255,255,255,0.12); backdrop-filter: blur(12px);
      border: 2px solid rgba(255,255,255,0.2); border-radius: 16px;
      padding: 20px; cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative; overflow: hidden;
    }
    .choice-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .choice-card:hover {
      transform: translateY(-4px) scale(1.02);
      border-color: rgba(255,255,255,0.5);
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .choice-card:hover::before { opacity: 1; }
    .choice-card:active { transform: translateY(0) scale(0.98); }

    .impact-tag {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600; padding: 3px 8px;
      border-radius: 20px; margin-top: 8px;
    }
    .tag-good { background: rgba(16,185,129,0.2); color: #6ee7b7; }
    .tag-mid { background: rgba(251,191,36,0.2); color: #fcd34d; }
    .tag-bad { background: rgba(239,68,68,0.2); color: #fca5a5; }

    /* Fact card */
    .fact-card {
      background: rgba(255,255,255,0.1); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 16px;
      padding: 20px; animation: slideUp 0.5s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Final report */
    .report-card {
      background: rgba(255,255,255,0.1); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.25); border-radius: 20px;
      padding: 28px; animation: slideUp 0.6s ease-out;
    }
    .report-bar {
      height: 12px; border-radius: 6px; background: rgba(255,255,255,0.1);
      overflow: hidden; position: relative;
    }
    .report-bar-fill {
      height: 100%; border-radius: 6px; transition: width 1.5s ease-out;
    }

    /* Misc */
    .glass-panel {
      background: rgba(255,255,255,0.08); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 20px;
    }
    .text-glow { text-shadow: 0 0 20px rgba(56,189,248,0.5); }
    .fade-in { animation: slideUp 0.4s ease-out; }

    @media (max-width: 640px) {
      .gauge-ring { width: 56px; height: 56px; }
      .gauge-inner { width: 40px; height: 40px; font-size: 12px; }
    }
  </style>
</head>

<body class="relative">
  <div class="wave"></div>
  <div class="wave2"></div>

  <div class="container mx-auto px-4 py-6 max-w-3xl relative z-10">

    <!-- Header -->
    <div class="text-center mb-6">
      <h1 class="text-3xl md:text-4xl font-bold text-white font-['Baloo_2'] text-glow mb-1">
        💧 Trace Your Tap
      </h1>
      <p class="text-sky-200 text-sm md:text-base font-medium">
        Follow water from source to your home — every choice has consequences
      </p>
    </div>

    <!-- Score Dashboard -->
    <div id="dashboard" class="glass-panel p-4 mb-5 flex justify-around items-center gap-2">
      <div class="flex flex-col items-center">
        <div class="gauge-ring" id="gauge-quality" style="--color:#22d3ee; --pct:0%;">
          <div class="gauge-inner"><span id="val-quality">0</span></div>
        </div>
        <span class="text-[11px] text-sky-300 mt-1 font-semibold">Quality</span>
      </div>
      <div class="flex flex-col items-center">
        <div class="gauge-ring" id="gauge-cost" style="--color:#a78bfa; --pct:0%;">
          <div class="gauge-inner"><span id="val-cost">0</span></div>
        </div>
        <span class="text-[11px] text-purple-300 mt-1 font-semibold">Affordability</span>
      </div>
      <div class="flex flex-col items-center">
        <div class="gauge-ring" id="gauge-sustain" style="--color:#34d399; --pct:0%;">
          <div class="gauge-inner"><span id="val-sustain">0</span></div>
        </div>
        <span class="text-[11px] text-emerald-300 mt-1 font-semibold">Sustainability</span>
      </div>
    </div>

    <!-- Progress pipeline -->
    <div class="mb-4">
      <div class="flex justify-between text-xs text-sky-300 mb-1 font-semibold">
        <span>Stage <span id="stage-num">1</span> / 8</span>
        <span id="pct-label">0%</span>
      </div>
      <div class="pipeline-track">
        <div class="pipeline-fill" id="pipeline" style="width:0%"></div>
      </div>
    </div>

    <!-- Journey Map (node pills) -->
    <div id="journey-map" class="glass-panel p-3 mb-5 flex flex-wrap items-center gap-2 min-h-[48px]">
      <span class="text-sky-400 text-xs font-medium" id="map-hint">Your journey builds here…</span>
    </div>

    <!-- Question area -->
    <div id="question-area" class="glass-panel p-5 mb-5">
      <p id="q-text" class="text-white font-bold text-lg md:text-xl mb-1"></p>
      <p id="q-sub" class="text-sky-300 text-sm mb-4"></p>
      <div id="choices" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
    </div>

    <!-- Fact card (hidden initially) -->
    <div id="fact-area" class="hidden"></div>

    <!-- Final report (hidden initially) -->
    <div id="report-area" class="hidden"></div>

  </div>

  <script>
    // ─── DATA ───────────────────────────────────────
    const stages = [
      {
        question: "Where does your water originate?",
        subtitle: "The source determines everything downstream.",
        icon: "🏔️",
        choices: [
          { text: "Mountain spring / glacier-fed river", icon: "🏔️", quality: 18, cost: 12, sustain: 16,
            tag: "good", fact: "Glacier-fed rivers supply water to over 1.9 billion people. But climate change is shrinking glaciers by 267 billion tonnes per year." },
          { text: "Underground aquifer (borewell)", icon: "🕳️", quality: 15, cost: 14, sustain: 10,
            tag: "mid", fact: "India extracts more groundwater than any country — 25% of the world total. Many aquifers are dropping 1-3 meters per year." },
          { text: "Local river or lake", icon: "🏞️", quality: 10, cost: 16, sustain: 14,
            tag: "mid", fact: "70% of India's surface water is contaminated. Rivers like the Ganga carry 3 billion liters of sewage daily." },
          { text: "Rainwater harvesting", icon: "🌧️", quality: 14, cost: 18, sustain: 20,
            tag: "good", fact: "A 100 sq.m roof in an area with 600mm rainfall can collect 60,000 liters/year — enough for a family of 5!" }
        ]
      },
      {
        question: "How far must the water travel to reach treatment?",
        subtitle: "Distance = energy + infrastructure + losses.",
        icon: "🛣️",
        choices: [
          { text: "Less than 2 km (local source)", icon: "📍", quality: 4, cost: 16, sustain: 14,
            tag: "good", fact: "Short pipelines lose only 5-8% of water to leaks. Every km of pipe added increases losses by 2-3%." },
          { text: "5-20 km via pipeline", icon: "🔧", quality: 3, cost: 10, sustain: 10,
            tag: "mid", fact: "India's urban water pipelines lose 40-60% of water to leaks and theft — called Non-Revenue Water (NRW)." },
          { text: "50+ km (inter-basin transfer)", icon: "🏗️", quality: 2, cost: 4, sustain: 6,
            tag: "bad", fact: "The Narmada canal network spans 458 km. Pumping water uphill over long distances uses enormous electricity." },
          { text: "Delivered by tanker truck", icon: "🚚", quality: 5, cost: 2, sustain: 4,
            tag: "bad", fact: "In Chennai's 2019 crisis, water tankers charged ₹3,000-6,000 per load. The poorest pay 10x more per liter than the rich." }
        ]
      },
      {
        question: "What treatment does the water receive?",
        subtitle: "Treatment quality directly affects health outcomes.",
        icon: "🧪",
        choices: [
          { text: "Full WTP (filtration + chlorination + UV)", icon: "🏭", quality: 20, cost: 8, sustain: 12,
            tag: "good", fact: "Modern Water Treatment Plants remove 99.9% of bacteria. The WHO standard is <1 E.coli per 100mL for safe drinking water." },
          { text: "Basic chlorination only", icon: "💊", quality: 12, cost: 14, sustain: 14,
            tag: "mid", fact: "Chlorination kills bacteria but doesn't remove heavy metals, pesticides, or dissolved solids. Residual chlorine should be 0.2-0.5 mg/L." },
          { text: "Community hand-pump (no treatment)", icon: "⛽", quality: 6, cost: 16, sustain: 10,
            tag: "mid", fact: "21% of communicable diseases in India are water-related. Untreated groundwater may contain arsenic or fluoride." },
          { text: "No formal treatment", icon: "⚠️", quality: 2, cost: 18, sustain: 8,
            tag: "bad", fact: "Diarrheal diseases from unsafe water kill ~1 lakh children under 5 in India every year. Simple boiling kills 99% of pathogens." }
        ]
      },
      {
        question: "How is water stored before distribution?",
        subtitle: "Storage affects both quality maintenance and supply reliability.",
        icon: "🏗️",
        choices: [
          { text: "Covered concrete service reservoir", icon: "🏛️", quality: 14, cost: 10, sustain: 14,
            tag: "good", fact: "Properly covered reservoirs prevent recontamination. Chlorine residual drops to zero within 24-48 hours in open tanks." },
          { text: "Elevated steel water tower", icon: "🗼", quality: 12, cost: 12, sustain: 12,
            tag: "mid", fact: "Elevated tanks use gravity for pressure — saving pumping energy. A 10m height gives ~1 bar of pressure." },
          { text: "Open community tank", icon: "🪣", quality: 6, cost: 16, sustain: 8,
            tag: "bad", fact: "Open tanks grow algae within days and become breeding grounds for mosquitoes. Contamination risk increases 5x." },
          { text: "Direct pumping (no storage)", icon: "⚡", quality: 10, cost: 8, sustain: 10,
            tag: "mid", fact: "Direct pumping gives fresh water but relies on 24/7 electricity. Power cuts = no water, affecting 60% of Indian towns." }
        ]
      },
      {
        question: "What type of distribution network delivers your water?",
        subtitle: "The 'last mile' is often where most problems occur.",
        icon: "🔧",
        choices: [
          { text: "Pressurized PVC/HDPE pipeline", icon: "🔵", quality: 14, cost: 10, sustain: 16,
            tag: "good", fact: "HDPE pipes last 50+ years and resist corrosion. They maintain pressure at 3-6 bar, ensuring water reaches upper floors." },
          { text: "Old cast-iron/asbestos pipes", icon: "🟤", quality: 6, cost: 12, sustain: 6,
            tag: "bad", fact: "Many Indian cities still use 50-80 year old pipes. Rust and biofilm inside old pipes can harbor bacteria even in treated water." },
          { text: "Intermittent supply (2-4 hrs/day)", icon: "⏰", quality: 8, cost: 14, sustain: 10,
            tag: "mid", fact: "Only 4% of Indian cities have 24×7 water supply. Intermittent supply causes pipe depressurization, sucking in sewage through cracks." },
          { text: "Community standpost / hand-carry", icon: "🚶", quality: 10, cost: 16, sustain: 12,
            tag: "mid", fact: "Women in rural India walk an average of 1.4 km daily to fetch water in places without piped supply. This means 700 hours per year lost." }
        ]
      },
      {
        question: "Do you have household-level purification?",
        subtitle: "The final barrier between you and waterborne diseases.",
        icon: "🥤",
        choices: [
          { text: "RO + UV + UF purifier", icon: "💎", quality: 20, cost: 4, sustain: 8,
            tag: "mid", fact: "RO purifiers reject 60-80% of input water as waste. A family using 10L/day of RO water actually consumes 30-40L." },
          { text: "Gravity-based / ceramic filter", icon: "🏺", quality: 14, cost: 14, sustain: 16,
            tag: "good", fact: "Ceramic candle filters remove 99% of bacteria without electricity or water waste. They cost ₹300-800 — affordable for most families." },
          { text: "Boiling before drinking", icon: "🔥", quality: 12, cost: 10, sustain: 10,
            tag: "mid", fact: "Boiling water for 1 minute kills virtually all pathogens. But it costs fuel/gas, doesn't remove chemicals, and adds to carbon emissions." },
          { text: "No purification (drink as-is)", icon: "🚰", quality: 2, cost: 18, sustain: 12,
            tag: "bad", fact: "163 million Indians lack access to safe drinking water. Even clear-looking water can contain invisible pathogens and heavy metals." }
        ]
      },
      {
        question: "How do you manage wastewater at home?",
        subtitle: "What leaves your home enters someone else's water source.",
        icon: "♻️",
        choices: [
          { text: "Connected to sewage treatment plant", icon: "🏭", quality: 6, cost: 8, sustain: 18,
            tag: "good", fact: "Only 37% of sewage generated in India is treated. The rest flows directly into rivers, contaminating downstream water sources." },
          { text: "Septic tank with soak-pit", icon: "🕳️", quality: 4, cost: 12, sustain: 12,
            tag: "mid", fact: "Poorly maintained septic tanks contaminate groundwater. They should be emptied every 3-5 years, but most never are." },
          { text: "Greywater reuse for gardening", icon: "🌱", quality: 4, cost: 16, sustain: 20,
            tag: "good", fact: "Reusing bath/kitchen water for gardens saves 50-80 L/day per household. This is the easiest water-saving hack!" },
          { text: "Open drain / no system", icon: "🚫", quality: 2, cost: 16, sustain: 2,
            tag: "bad", fact: "Open drains contaminate soil and groundwater within 50m radius. Flies breeding in open drains spread cholera and typhoid." }
        ]
      },
      {
        question: "What is your household's daily water conservation practice?",
        subtitle: "Small daily habits determine long-term water security.",
        icon: "🌍",
        choices: [
          { text: "Bucket bath + tap-off brushing + full-load washing", icon: "✅", quality: 4, cost: 16, sustain: 20,
            tag: "good", fact: "A conscious household uses 70-80 LPCD. Basic habits like bucket bathing (20L vs 120L shower) save 100+ liters daily!" },
          { text: "Some awareness but inconsistent", icon: "🔄", quality: 2, cost: 12, sustain: 12,
            tag: "mid", fact: "The average Indian uses 135 LPCD, but the BIS recommends only 135L for urban and 55L for rural areas." },
          { text: "No specific conservation effort", icon: "💸", quality: 0, cost: 8, sustain: 4,
            tag: "bad", fact: "Wasteful habits can push usage to 200+ LPCD. If everyone did this, India would face absolute water scarcity by 2030." },
          { text: "Rainwater harvest + greywater reuse + monitoring", icon: "🌟", quality: 6, cost: 14, sustain: 22,
            tag: "good", fact: "Households that track water use with a simple meter reduce consumption by 20-30% just from awareness!" }
        ]
      }
    ];

    // ─── STATE ───────────────────────────────────────
    let step = 0;
    let scores = { quality: 0, cost: 0, sustain: 0 };
    let chosenPath = [];

    // ─── DOM ─────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const qText = $('q-text'), qSub = $('q-sub'), choicesDiv = $('choices');
    const factArea = $('fact-area'), reportArea = $('report-area');
    const questionArea = $('question-area');
    const pipeline = $('pipeline'), stageNum = $('stage-num'), pctLabel = $('pct-label');
    const journeyMap = $('journey-map'), mapHint = $('map-hint');

    // ─── BUBBLES ─────────────────────────────────────
    for (let i = 0; i < 12; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      const s = 6 + Math.random() * 20;
      b.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;bottom:${-s}px;animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*8}s;`;
      document.body.appendChild(b);
    }

    // ─── GAUGE UPDATE ────────────────────────────────
    function updateGauges() {
      const maxPossible = stages.length * 20; // rough max per category
      ['quality', 'cost', 'sustain'].forEach(key => {
        const pct = Math.min(Math.round((scores[key] / maxPossible) * 100), 100);
        const gaugeId = key === 'quality' ? 'gauge-quality' : key === 'cost' ? 'gauge-cost' : 'gauge-sustain';
        const valId = key === 'quality' ? 'val-quality' : key === 'cost' ? 'val-cost' : 'val-sustain';
        $(gaugeId).style.setProperty('--pct', pct + '%');
        $(valId).textContent = pct;
      });
    }

    // ─── MAP UPDATE ──────────────────────────────────
    function addToMap(icon, text, isFinal) {
      if (mapHint) mapHint.remove();
      if (journeyMap.querySelectorAll('.node-pill').length > 0) {
        const arrow = document.createElement('span');
        arrow.className = 'node-arrow';
        arrow.textContent = '→';
        journeyMap.appendChild(arrow);
      }
      const pill = document.createElement('span');
      pill.className = 'node-pill' + (isFinal ? ' done' : '');
      pill.innerHTML = `${icon} ${text.length > 18 ? text.slice(0, 16) + '…' : text}`;
      pill.style.animationDelay = '0.1s';
      journeyMap.appendChild(pill);
      journeyMap.scrollLeft = journeyMap.scrollWidth;
    }

    // ─── RENDER STEP ─────────────────────────────────
    function renderStep() {
      if (step >= stages.length) { showReport(); return; }
      factArea.classList.add('hidden');
      factArea.innerHTML = '';
      questionArea.classList.remove('hidden');

      const s = stages[step];
      stageNum.textContent = step + 1;
      const pct = Math.round((step / stages.length) * 100);
      pipeline.style.width = pct + '%';
      pctLabel.textContent = pct + '%';

      qText.innerHTML = `<span class="text-2xl mr-2">${s.icon}</span>${s.question}`;
      qSub.textContent = s.subtitle;

      choicesDiv.innerHTML = '';
      s.choices.forEach((c, i) => {
        const tagClass = c.tag === 'good' ? 'tag-good' : c.tag === 'mid' ? 'tag-mid' : 'tag-bad';
        const tagLabel = c.tag === 'good' ? '✓ Optimal' : c.tag === 'mid' ? '~ Moderate' : '✗ Risky';
        const card = document.createElement('div');
        card.className = 'choice-card';
        card.innerHTML = `
          <div class="text-2xl mb-2">${c.icon}</div>
          <p class="text-white font-semibold text-sm leading-snug">${c.text}</p>
          <span class="impact-tag ${tagClass}">${tagLabel}</span>
        `;
        card.onclick = () => selectChoice(i);
        choicesDiv.appendChild(card);
      });
    }

    // ─── SELECT CHOICE ───────────────────────────────
    function selectChoice(idx) {
      const s = stages[step];
      const c = s.choices[idx];

      // Update scores
      scores.quality += c.quality;
      scores.cost += c.cost;
      scores.sustain += c.sustain;
      updateGauges();

      chosenPath.push({ stage: s.question, choice: c.text, icon: c.icon, fact: c.fact, tag: c.tag });

      // Highlight selected, dim others
      const cards = choicesDiv.querySelectorAll('.choice-card');
      cards.forEach((card, i) => {
        card.onclick = null;
        card.style.cursor = 'default';
        if (i === idx) {
          card.style.borderColor = c.tag === 'good' ? '#34d399' : c.tag === 'mid' ? '#fbbf24' : '#f87171';
          card.style.background = 'rgba(255,255,255,0.2)';
        } else {
          card.style.opacity = '0.3';
          card.style.transform = 'scale(0.95)';
        }
      });

      addToMap(c.icon, c.text, false);

      // Show fact card
      setTimeout(() => {
        factArea.classList.remove('hidden');
        factArea.innerHTML = `
          <div class="fact-card">
            <div class="flex items-start gap-3">
              <span class="text-2xl">📖</span>
              <div>
                <p class="text-sky-200 font-bold text-sm mb-1">Did you know?</p>
                <p class="text-white/90 text-sm leading-relaxed">${c.fact}</p>
              </div>
            </div>
            <button id="next-btn"
              class="mt-4 w-full py-3 rounded-xl font-bold text-sm
              bg-gradient-to-r from-cyan-500 to-blue-600 text-white
              hover:from-cyan-400 hover:to-blue-500 transition-all
              hover:shadow-lg hover:shadow-cyan-500/25 active:scale-95">
              Continue Journey →
            </button>
          </div>
        `;
        $('next-btn').onclick = () => { step++; renderStep(); };
      }, 400);
    }

    // ─── FINAL REPORT ────────────────────────────────
    function showReport() {
      questionArea.classList.add('hidden');
      factArea.classList.add('hidden');
      pipeline.style.width = '100%';
      pctLabel.textContent = '100%';
      stageNum.textContent = '8';
      addToMap('🏠', 'Your Home', true);

      const maxPossible = stages.length * 20;
      const qPct = Math.min(Math.round((scores.quality / maxPossible) * 100), 100);
      const cPct = Math.min(Math.round((scores.cost / maxPossible) * 100), 100);
      const sPct = Math.min(Math.round((scores.sustain / maxPossible) * 100), 100);
      const overall = Math.round((qPct + cPct + sPct) / 3);

      let grade, gradeColor, gradeEmoji, advice;
      if (overall >= 75) { grade = 'A'; gradeColor = '#34d399'; gradeEmoji = '🌟'; advice = 'Excellent! Your water journey is well-managed, sustainable, and safe.'; }
      else if (overall >= 55) { grade = 'B'; gradeColor = '#60a5fa'; gradeEmoji = '👍'; advice = 'Good setup! A few upgrades in treatment or conservation could make a big difference.'; }
      else if (overall >= 35) { grade = 'C'; gradeColor = '#fbbf24'; gradeEmoji = '⚠️'; advice = 'There are significant gaps. Focus on water treatment and reducing wastage.'; }
      else { grade = 'D'; gradeColor = '#f87171'; gradeEmoji = '🚨'; advice = 'Critical concerns! Your water may be unsafe and the system is unsustainable. Immediate action needed.'; }

      // Build improvement tips
      let tips = [];
      chosenPath.forEach(p => {
        if (p.tag === 'bad') tips.push(`<li class="text-red-300">⚠️ <strong>${p.choice}</strong> — consider upgrading this stage</li>`);
        else if (p.tag === 'mid') tips.push(`<li class="text-yellow-300">💡 <strong>${p.choice}</strong> — room for improvement</li>`);
      });

      reportArea.classList.remove('hidden');
      reportArea.innerHTML = `
        <div class="report-card mb-4">
          <div class="text-center mb-6">
            <div class="text-5xl mb-2">${gradeEmoji}</div>
            <h2 class="text-2xl font-bold text-white font-['Baloo_2']">Water Journey Report</h2>
            <div class="text-6xl font-bold mt-2" style="color:${gradeColor}">${grade}</div>
            <p class="text-sky-200 text-sm mt-2 max-w-md mx-auto">${advice}</p>
          </div>

          <div class="space-y-4 mb-6">
            <div>
              <div class="flex justify-between text-sm mb-1">
                <span class="text-cyan-300 font-semibold">💧 Water Quality</span>
                <span class="text-white font-bold">${qPct}%</span>
              </div>
              <div class="report-bar"><div class="report-bar-fill" style="width:${qPct}%; background:linear-gradient(90deg,#06b6d4,#22d3ee)"></div></div>
            </div>
            <div>
              <div class="flex justify-between text-sm mb-1">
                <span class="text-purple-300 font-semibold">💰 Affordability</span>
                <span class="text-white font-bold">${cPct}%</span>
              </div>
              <div class="report-bar"><div class="report-bar-fill" style="width:${cPct}%; background:linear-gradient(90deg,#8b5cf6,#a78bfa)"></div></div>
            </div>
            <div>
              <div class="flex justify-between text-sm mb-1">
                <span class="text-emerald-300 font-semibold">🌍 Sustainability</span>
                <span class="text-white font-bold">${sPct}%</span>
              </div>
              <div class="report-bar"><div class="report-bar-fill" style="width:${sPct}%; background:linear-gradient(90deg,#10b981,#34d399)"></div></div>
            </div>
          </div>

          <div class="text-sm text-sky-200 text-center">Overall Score: <strong class="text-white text-lg">${overall}%</strong></div>
        </div>

        ${tips.length ? `
        <div class="report-card mb-4">
          <h3 class="text-white font-bold mb-3">🔧 Areas to Improve</h3>
          <ul class="space-y-2 text-sm">${tips.join('')}</ul>
        </div>` : ''}

        <div class="report-card mb-4">
          <h3 class="text-white font-bold mb-3">🗺️ Your Complete Journey</h3>
          <div class="space-y-2">
            ${chosenPath.map((p, i) => `
              <div class="flex items-center gap-3 text-sm">
                <span class="text-lg">${p.icon}</span>
                <span class="text-white/80">${p.choice}</span>
                <span class="ml-auto impact-tag ${p.tag === 'good' ? 'tag-good' : p.tag === 'mid' ? 'tag-mid' : 'tag-bad'}">${p.tag === 'good' ? '✓' : p.tag === 'mid' ? '~' : '✗'}</span>
              </div>
            `).join('')}
            <div class="flex items-center gap-3 text-sm">
              <span class="text-lg">🏠</span>
              <span class="text-emerald-300 font-semibold">Your Home — Journey Complete!</span>
            </div>
          </div>
        </div>

        <div class="text-center">
          <button onclick="location.reload()"
            class="px-8 py-3 rounded-full font-bold text-sm
            bg-gradient-to-r from-cyan-500 to-blue-600 text-white
            hover:from-cyan-400 hover:to-blue-500 transition-all
            hover:shadow-lg hover:shadow-cyan-500/25 active:scale-95">
            🔄 Replay with Different Choices
          </button>
        </div>
      `;

      // Animate bars after render
      setTimeout(() => {
        reportArea.querySelectorAll('.report-bar-fill').forEach(bar => {
          bar.style.width = bar.style.width; // force reflow trick handled by browser
        });
      }, 100);
    }

    // ─── START ────────────────────────────────────────
    renderStep();
  </script>
</body>
</html>
