<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Water Quest — Chapter 2 Quiz</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #7dd3fc 0%, #e6f6ff 40%, #ffffff 100%);
      min-height: 100vh;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }
    .wave {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 140px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ffffff" fill-opacity="0.85" d="M0,192L48,197.3C96,203,192,213,288,213.3C384,213,480,203,576,208C672,213,768,203,864,192C960,181,1056,171,1152,160C1248,149,1344,139,1392,133.3L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') repeat-x bottom;
      animation: wave 16s linear infinite;
      pointer-events: none;
    }
    @keyframes wave {
      0% { background-position-x: 0; }
      100% { background-position-x: -1440px; }
    }
    .bubble {
      position: absolute;
      background: rgba(255,255,255,0.7);
      border-radius: 50%;
      pointer-events: none;
      animation: float 10s infinite ease-in-out;
      box-shadow: 0 0 15px white;
    }
    @keyframes float {
      0%,100% { transform: translateY(0) scale(1); opacity: 0.8; }
      50%     { transform: translateY(-220px) scale(0.6); opacity: 0.3; }
    }
    .option {
      transition: all 0.3s ease;
    }
    .option:hover {
      transform: scale(1.03);
    }
    .correct { background-color: #86efac !important; border-color: #15803d !important; }
    .wrong   { background-color: #fda4af !important; border-color: #e11d48 !important; }
    #confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }
    .confetti {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      animation: confetti-fall 3s linear forwards;
    }
    @keyframes confetti-fall {
      to { transform: translateY(120vh) rotate(720deg); opacity: 0; }
    }
    .badge-bounce {
      animation: bounce 1.5s infinite alternate;
    }
    @keyframes bounce {
      from { transform: translateY(0) scale(1); }
      to   { transform: translateY(-20px) scale(1.1); }
    }
  </style>
</head>
<body class="relative">

  <div class="wave"></div>

  <!-- Bubbles -->
  <div class="bubble w-12 h-12 top-[15%] left-[10%] animate-[float_11s_infinite]"></div>
  <div class="bubble w-8 h-8 top-[40%] right-[18%] animate-[float_13s_infinite_1.2s]"></div>
  <div class="bubble w-14 h-14 bottom-[25%] left-[25%] animate-[float_10s_infinite_2.5s]"></div>
  <div class="bubble w-10 h-10 top-[70%] right-[12%] animate-[float_12s_infinite_0.8s]"></div>

  <div class="container mx-auto px-6 py-12 max-w-4xl relative z-10">

    <h1 class="text-5xl md:text-6xl font-bold text-sky-900 text-center mb-3 font-['Baloo_2'] drop-shadow-lg">
      Water Audit & Flow Quiz
    </h1>

    <p class="text-center text-xl text-slate-700 mb-10">6 quick questions — test your understanding of audits & measuring flow!</p>

    <!-- Progress -->
    <div class="flex justify-between items-center mb-8 text-sm font-medium text-slate-600">
      <div>Question <span id="q-current">1</span>/6</div>
      <div class="w-48 h-2 bg-sky-200 rounded-full overflow-hidden">
        <div id="progress" class="h-full bg-sky-600 w-1/6 transition-all duration-500"></div>
      </div>
    </div>

    <!-- Question Area -->
    <div id="question-card" class="bg-white soft-card p-8 rounded-3xl shadow-2xl min-h-[380px]">

      <h2 id="question-text" class="text-2xl md:text-3xl font-semibold text-sky-900 mb-10 text-center leading-tight"></h2>

      <div id="options" class="grid grid-cols-1 gap-4"></div>

      <!-- Feedback -->
      <div id="feedback-area" class="mt-10 hidden text-center">
        <div id="feedback-text" class="text-2xl font-bold mb-6"></div>
        <button id="next-btn" class="px-10 py-4 bg-sky-600 hover:bg-sky-700 text-white text-xl font-bold rounded-full shadow-xl transition">
          Next Question →
        </button>
      </div>
    </div>

    <!-- Final Result -->
    <div id="final-screen" class="hidden text-center mt-12">
      <h2 id="final-title" class="text-5xl font-bold mb-6"></h2>
      <div id="final-score" class="text-6xl font-bold text-emerald-600 mb-8"></div>
      <div id="confetti-container"></div>
      <div id="badge" class="hidden inline-block mt-10">
        <div class="relative w-64 h-64 mx-auto badge-bounce">
          <svg viewBox="0 0 300 300" class="w-full h-full drop-shadow-2xl">
            <defs>
              <radialGradient id="grad">
                <stop offset="0%" stop-color="#7dd3fc"/>
                <stop offset="100%" stop-color="#0ea5e9"/>
              </radialGradient>
            </defs>
            <circle cx="150" cy="150" r="140" fill="url(#grad)" />
            <circle cx="150" cy="150" r="110" fill="white" />
            <text x="150" y="130" font-family="Baloo 2" font-size="48" font-weight="700" fill="#0ea5e9" text-anchor="middle">Audit</text>
            <text x="150" y="180" font-family="Baloo 2" font-size="42" fill="#0ea5e9" text-anchor="middle">Champion</text>
          </svg>
          <div class="absolute inset-0 flex items-center justify-center text-6xl animate-pulse">🏆</div>
        </div>
        <p class="mt-4 text-xl font-bold text-emerald-700">100% — You're a Water Audit Champion!</p>
      </div>
      <button onclick="location.reload()" class="mt-12 px-12 py-6 bg-emerald-500 hover:bg-emerald-600 text-white text-2xl font-bold rounded-full shadow-2xl transition">
        Play Again
      </button>
    </div>
  </div>

  <script>
    const questions = [
      {
        q: "What is the very first step of a water audit?",
        options: ["Install meters", "Preliminary Survey", "Write report", "Fix leaks"],
        answer: 1,
        feedback: "Yes! Preliminary survey includes bills, mapping pipes, and checking rules."
      },
      {
        q: "In the 'Bucket & Stopwatch' method, if 5 L fills in 20 seconds, what is the flow rate?",
        options: ["15 L/min", "25 L/min", "5 L/min", "60 L/min"],
        answer: 0,
        feedback: "Correct! 5 ÷ 20 = 0.25 L/sec → 0.25 × 60 = 15 L/min"
      },
      {
        q: "Which is an example of real loss in water audit?",
        options: ["Meter reading error", "Pipe leakage", "Theft", "Unrecorded use"],
        answer: 1,
        feedback: "Yes! Real losses are actual physical leaks or evaporation."
      },
      {
        q: "What is the efficient flow rate for a bathroom tap?",
        options: ["> 12 L/min", "4–6 L/min", "15–20 L/min", "1–2 L/min"],
        answer: 1,
        feedback: "Right! 4–6 L/min is efficient; >10 L/min is wasteful."
      },
      {
        q: "Which government program focuses on groundwater management in critical states?",
        options: ["Jal Jeevan Mission", "Atal Bhujal Yojana", "Namami Gange", "Amrit Sarovars"],
        answer: 1,
        feedback: "Correct! Atal Bhujal Yojana targets sustainable groundwater recharge."
      },
      {
        q: "What should you do if a shower flow rate is >15 L/min?",
        options: ["Ignore it", "Add low-flow aerator", "Use more water", "Remove the showerhead"],
        answer: 1,
        feedback: "Perfect! Low-flow aerator can save up to 40% without losing pressure."
      }
    ];

    let current = 0;
    let score = 0;

    function loadQuestion() {
      const q = questions[current];
      document.getElementById('question-text').innerHTML = q.q;
      document.getElementById('q-current').textContent = current + 1;
      document.getElementById('progress').style.width = ((current + 1) / questions.length * 100) + '%';

      const opts = document.getElementById('options');
      opts.innerHTML = '';

      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = `option w-full text-left p-5 bg-white border-2 border-sky-300 hover:border-sky-500 rounded-2xl text-lg transition-all`;
        btn.textContent = opt;
        btn.onclick = () => checkAnswer(i, q);
        opts.appendChild(btn);
      });

      document.getElementById('feedback-area').classList.add('hidden');
    }

    function checkAnswer(selected, q) {
      const isCorrect = selected === q.answer;

      const buttons = document.querySelectorAll('#options button');
      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.answer) btn.classList.add('correct');
        if (i === selected && !isCorrect) btn.classList.add('wrong');
      });

      const feedbackArea = document.getElementById('feedback-area');
      const feedbackText = document.getElementById('feedback-text');

      if (isCorrect) {
        score++;
        feedbackText.innerHTML = `<span class="text-emerald-600">✅ Correct!</span><br><span class="text-lg">${q.feedback}</span>`;
      } else {
        feedbackText.innerHTML = `<span class="text-red-600">❌ Wrong</span><br><span class="text-lg">Correct: ${q.options[q.answer]}<br>${q.feedback}</span>`;
      }

      feedbackArea.classList.remove('hidden');
      document.getElementById('next-btn').onclick = nextQuestion;
    }

    function nextQuestion() {
      current++;
      if (current < questions.length) {
        loadQuestion();
      } else {
        showFinal();
      }
    }

    function showFinal() {
      document.getElementById('question-card').classList.add('hidden');

      const final = document.getElementById('final-screen');
      final.classList.remove('hidden');

      const percent = Math.round((score / questions.length) * 100);

      document.getElementById('final-score').textContent = `${percent}% (${score}/${questions.length})`;

      if (percent === 100) {
        document.getElementById('final-title').innerHTML = `🎉 PERFECT SCORE!<br>Water Audit Champion!`;
        document.getElementById('badge').classList.remove('hidden');
        createConfetti();
      } else {
        document.getElementById('final-title').innerHTML = `Well Done!<br>Keep practicing audits & flow measurement!`;
      }
    }

    function createConfetti() {
      const container = document.getElementById('confetti-container');
      for (let i = 0; i < 100; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + '%';
        c.style.top = '-20px';
        c.style.background = ['#7dd3fc', '#60a5fa', '#34d399', '#fbbf24'][Math.floor(Math.random()*4)];
        c.style.animationDelay = Math.random() * 2 + 's';
        container.appendChild(c);
        setTimeout(() => c.remove(), 5000);
      }
    }

    // Start quiz
    loadQuestion();
  </script>
</body>
</html>
